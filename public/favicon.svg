<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FraterAI logo">
  <rect width="100" height="100" rx="20" fill="#ffffff" />
  <g stroke="#1a4731" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer hexagon-like braces -->
    <path d="M 30,50 L 30,35 L 40,25 L 50,25" />
    <path d="M 70,50 L 70,35 L 60,25 L 50,25" />
    <path d="M 30,50 L 30,65 L 40,75 L 50,75" />
    <path d="M 70,50 L 70,65 L 60,75 L 50,75" />

    <!-- Inner connection ring -->
    <path d="M 34,50 L 50,38 L 66,50 L 50,62 Z" />
    
    <!-- Large rotated square (diamond) -->
    <polygon points="50,15 85,50 50,85 15,50" />
    
    <!-- Diagonal spokes radiating outward -->
    <path d="M 43,43 L 34,34" />
    <path d="M 57,43 L 66,34" />
    <path d="M 43,57 L 34,66" />
    <path d="M 57,57 L 66,66" />
  </g>
  <g fill="#1a4731">
    <!-- Diamond outer nodes -->
    <circle cx="50" cy="15" r="5" />
    <circle cx="85" cy="50" r="5" />
    <circle cx="50" cy="85" r="5" />
    <circle cx="15" cy="50" r="5" />
    
    <!-- Inner ring nodes -->
    <circle cx="50" cy="38" r="4.5" />
    <circle cx="50" cy="62" r="4.5" />
    <circle cx="34" cy="50" r="4.5" />
    <circle cx="66" cy="50" r="4.5" />
    
    <!-- Center shape -->
    <polygon points="41,50 50,43 59,50 50,57" />
  </g>
</svg>
